<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Among Us - Offline</title>
    <style>
        /* --- General styles --- */
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* --- Sabotage overlay (hidden by default) --- */
        #sabotageOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #sabotageOverlay.active {
            display: flex;
        }
        #sabotageOverlay img {
            max-width: 90%;
            max-height: 80vh;
            border: 3px solid red;
            box-shadow: 0 0 50px rgba(255,0,0,0.6);
        }
        #sabotageOverlay .sabotage-text {
            color: red;
            font-size: 32px;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 0 20px rgba(255,0,0,0.8);
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* --- Admin panel (hidden by default) --- */
        #adminPanel {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #ff6b6b;
            z-index: 10000;
            min-width: 200px;
            box-shadow: 0 0 30px rgba(255,0,0,0.3);
        }
        #adminPanel.active {
            display: block;
        }
        #adminPanel h3 {
            margin: 0 0 15px 0;
            color: #ff6b6b;
            text-align: center;
            font-size: 18px;
            border-bottom: 1px solid #ff6b6b;
            padding-bottom: 10px;
        }
        #adminPanel .status {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 15px;
        }
        #adminPanel .status span {
            color: #4ecdc4;
            font-weight: bold;
        }
        .sabotage-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .sabotage-btn.trigger {
            background: #ff6b6b;
            color: white;
        }
        .sabotage-btn.trigger:hover {
            background: #ff4757;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }
        .sabotage-btn.clear {
            background: #4ecdc4;
            color: white;
        }
        .sabotage-btn.clear:hover {
            background: #45b7aa;
            transform: scale(1.05);
        }
        .sabotage-btn .count {
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            padding: 2px 10px;
            margin-left: 8px;
            font-size: 14px;
        }

        /* --- Admin login --- */
        #adminLogin {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10001;
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #4ecdc4;
        }
        #adminLogin input {
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            background: #2d2d44;
            color: white;
        }
        #adminLogin button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            background: #4ecdc4;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-left: 8px;
        }
        #adminLogin button:hover {
            background: #45b7aa;
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            #adminPanel { bottom: 10px; right: 10px; padding: 15px; min-width: 150px; }
            .sabotage-btn { font-size: 14px; padding: 10px; }
            #sabotageOverlay .sabotage-text { font-size: 24px; }
            #adminLogin { bottom: 10px; right: 10px; padding: 15px; }
            #adminLogin input { width: 120px; }
        }
    </style>
</head>
<body>

    <!-- The actual game container -->
    <div id="gameContainer"></div>

    <!-- Sabotage overlay (shown to sabotaged users) -->
    <div id="sabotageOverlay">
        <img id="sabotageImage" src="image.png" alt="SABOTAGE!">
        <div class="sabotage-text">⚠️ SYSTEM COMPROMISED ⚠️</div>
    </div>

    <!-- Admin login form -->
    <div id="adminLogin">
        <input type="password" id="adminPassword" placeholder="Enter admin password" />
        <button onclick="loginAdmin()">Unlock</button>
        <div style="color:#888; font-size:12px; margin-top:8px;">Default: admin123</div>
    </div>

    <!-- Admin panel (visible after login) -->
    <div id="adminPanel">
        <h3>👾 ADMIN CONTROL</h3>
        <div class="status">👥 Connected: <span id="userCount">1</span></div>
        <button class="sabotage-btn trigger" onclick="triggerSabotage()">
            💥 SABOTAGE ALL
        </button>
        <button class="sabotage-btn trigger" onclick="triggerSabotageImage('image.png')">
            🖼️ SHOW IMAGE.PNG
        </button>
        <button class="sabotage-btn clear" onclick="clearSabotage()">
            ✅ CLEAR SABOTAGE
        </button>
        <div style="font-size:12px; color:#666; margin-top:10px; text-align:center;">
            ⚡ Sabotage active: <span id="sabotageStatus">None</span>
        </div>
    </div>

    <!-- Include Unity loader (will be replaced by your local copy) -->
    <script src="UnityLoader.js"></script>
    <script>
        // ============================================================
        // 1. UNITY GAME LOADER (your original loader code)
        // ============================================================
        // This is the standard UnityLoader.instantiate call.
        // The manifest path should point to your local Build/Game.json
        UnityLoader.instantiate("gameContainer", "Build/Game.json");

        // ============================================================
        // 2. SABOTAGE SYSTEM (peer-to-peer via localStorage)
        // ============================================================
        // This uses BroadcastChannel API to communicate between tabs/windows
        // on the SAME device. For OTHER devices, it uses localStorage
        // with a polling mechanism (since they're on the same local network).
        // ============================================================

        // --- Configuration ---
        const ADMIN_PASSWORD = "admin123"; // Change this!
        const SABOTAGE_KEY = "sabotage_active";
        const SABOTAGE_IMAGE_KEY = "sabotage_image";
        const SABOTAGE_TRIGGER_TIME = "sabotage_trigger_time";

        // --- State ---
        let isAdmin = false;
        let isSabotaged = false;
        let pollInterval = null;

        // --- DOM refs ---
        const overlay = document.getElementById('sabotageOverlay');
        const sabotageImg = document.getElementById('sabotageImage');
        const adminPanel = document.getElementById('adminPanel');
        const adminLogin = document.getElementById('adminLogin');
        const userCountSpan = document.getElementById('userCount');
        const sabotageStatusSpan = document.getElementById('sabotageStatus');

        // --- BroadcastChannel for same-device communication ---
        let channel = null;
        try {
            channel = new BroadcastChannel('amongus-sabotage');
            channel.onmessage = (e) => {
                if (e.data.type === 'sabotage') {
                    showSabotage(e.data.image);
                } else if (e.data.type === 'clear') {
                    clearSabotage();
                }
            };
        } catch (e) {
            console.log('BroadcastChannel not supported, using polling fallback');
        }

        // --- Check if this device is the admin ---
        function checkAdmin() {
            // Admin status is stored in sessionStorage (persists per tab)
            isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            if (isAdmin) {
                adminLogin.style.display = 'none';
                adminPanel.classList.add('active');
                startAdminPolling();
            } else {
                adminLogin.style.display = 'block';
                adminPanel.classList.remove('active');
            }
        }

        // --- Admin login ---
        function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('isAdmin', 'true');
                isAdmin = true;
                adminLogin.style.display = 'none';
                adminPanel.classList.add('active');
                startAdminPolling();
                // Notify other tabs that admin is online
                if (channel) {
                    channel.postMessage({ type: 'admin_online' });
                }
            } else {
                alert('Wrong password!');
            }
        }

        // --- Trigger sabotage (admin only) ---
        function triggerSabotage() {
            if (!isAdmin) return;
            const image = document.getElementById('sabotageImage').src;
            triggerSabotageImage(image);
        }

        function triggerSabotageImage(imageUrl) {
            if (!isAdmin) return;
            // Store sabotage state in localStorage (for other devices)
            localStorage.setItem(SABOTAGE_KEY, 'true');
            localStorage.setItem(SABOTAGE_IMAGE_KEY, imageUrl);
            localStorage.setItem(SABOTAGE_TRIGGER_TIME, Date.now().toString());
            // Notify same-device tabs via BroadcastChannel
            if (channel) {
                channel.postMessage({ type: 'sabotage', image: imageUrl });
            }
            // Show on admin's own screen too (if they want)
            // showSabotage(imageUrl); // uncomment if you want to see it too
            sabotageStatusSpan.textContent = 'ACTIVE! 🚨';
            sabotageStatusSpan.style.color = '#ff6b6b';
            updateUserCount();
        }

        // --- Clear sabotage (admin only) ---
        function clearSabotage() {
            if (!isAdmin) return;
            localStorage.removeItem(SABOTAGE_KEY);
            localStorage.removeItem(SABOTAGE_IMAGE_KEY);
            localStorage.removeItem(SABOTAGE_TRIGGER_TIME);
            if (channel) {
                channel.postMessage({ type: 'clear' });
            }
            // Clear locally
            overlay.classList.remove('active');
            isSabotaged = false;
            sabotageStatusSpan.textContent = 'None';
            sabotageStatusSpan.style.color = '#4ecdc4';
            updateUserCount();
        }

        // --- Show sabotage on this device ---
        function showSabotage(imageUrl) {
            if (isAdmin) return; // Admins are immune (or not, change if you want)
            // Use the image URL (could be local or absolute)
            sabotageImg.src = imageUrl;
            overlay.classList.add('active');
            isSabotaged = true;
            // Play a sound effect? (optional)
        }

        // --- Clear sabotage locally ---
        function clearSabotageLocal() {
            overlay.classList.remove('active');
            isSabotaged = false;
        }

        // --- Poll localStorage for changes (for cross-device sync) ---
        function startAdminPolling() {
            // Poll every 2 seconds to check for new devices
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(() => {
                updateUserCount();
                // Check if any device has triggered sabotage
                const active = localStorage.getItem(SABOTAGE_KEY) === 'true';
                if (active && !isAdmin) {
                    // If we're not admin and sabotage is active, show it
                    const img = localStorage.getItem(SABOTAGE_IMAGE_KEY) || 'image.png';
                    showSabotage(img);
                } else if (!active && isSabotaged) {
                    clearSabotageLocal();
                }
            }, 2000);
        }

        // --- Count how many devices are connected ---
        function updateUserCount() {
            // This is a best-effort count using localStorage
            // We'll store a heartbeat from each device
            const deviceId = localStorage.getItem('deviceId') || 'device_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('deviceId', deviceId);
            localStorage.setItem('heartbeat_' + deviceId, Date.now().toString());

            // Count active devices (heartbeat in last 10 seconds)
            let count = 0;
            for (let key in localStorage) {
                if (key.startsWith('heartbeat_')) {
                    const time = parseInt(localStorage.getItem(key));
                    if (Date.now() - time < 10000) {
                        count++;
                    } else {
                        localStorage.removeItem(key); // clean up stale
                    }
                }
            }
            // Clean up our own stale entries
            userCountSpan.textContent = count || 1;
            return count;
        }

        // --- Auto-cleanup on page unload ---
        window.addEventListener('beforeunload', () => {
            const deviceId = localStorage.getItem('deviceId');
            if (deviceId) {
                localStorage.removeItem('heartbeat_' + deviceId);
            }
            if (pollInterval) {
                clearInterval(pollInterval);
            }
        });

        // --- Also check for sabotage on load ---
        function checkForSabotageOnLoad() {
            const active = localStorage.getItem(SABOTAGE_KEY) === 'true';
            if (active && !isAdmin) {
                const img = localStorage.getItem(SABOTAGE_IMAGE_KEY) || 'image.png';
                showSabotage(img);
            }
        }

        // --- Init ---
        checkAdmin();
        checkForSabotageOnLoad();
        updateUserCount();

        // --- If user is not admin, listen for changes ---
        if (!isAdmin) {
            // Poll for changes (non-admin also need to react)
            setInterval(() => {
                const active = localStorage.getItem(SABOTAGE_KEY) === 'true';
                if (active && !isSabotaged && !isAdmin) {
                    const img = localStorage.getItem(SABOTAGE_IMAGE_KEY) || 'image.png';
                    showSabotage(img);
                } else if (!active && isSabotaged) {
                    clearSabotageLocal();
                }
            }, 1500);
        }

        console.log('🕹️ Among Us Offline - Admin mode:', isAdmin);
        console.log('💡 Admin password:', ADMIN_PASSWORD);
        console.log('📡 Use "admin" panel to sabotage other devices!');
    </script>
</body>
</html>
