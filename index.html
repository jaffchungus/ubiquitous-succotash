<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus: Cyber Chess</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-start: #0f0c29;
            --bg-mid: #302b63;
            --bg-end: #24243e;
            --neon-red: #ff2a2a;
            --neon-orange: #ff7b00;
            --neon-yellow: #fce803;
            --neon-green: #00ff55;
            --neon-blue: #00e5ff;
            --glass-bg: rgba(16, 18, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
            background-attachment: fixed;
            color: white;
            overflow-x: hidden;
            margin: 0;
            min-height: 100vh;
        }

        h1, h2, h3, .cyber-font {
            font-family: 'Orbitron', sans-serif;
        }

        /* Glassmorphism */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Effects */
        #fx-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            transform: translate3d(0, 0, 0);
        }

        .chromatic {
            animation: chromatic-aberration 0.4s ease-in-out;
        }

        .pulse-flash {
            animation: blue-pulse 0.8s ease-out;
        }

        /* Chess Board */
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: all 0.2s;
        }

        .square.dark { background-color: rgba(30, 41, 59, 0.8); }
        .square.light { background-color: rgba(71, 85, 105, 0.8); }
        .square.highlight { background-color: rgba(0, 255, 85, 0.4) !important; box-shadow: inset 0 0 10px var(--neon-green); }
        .square.selected { background-color: rgba(0, 229, 255, 0.5) !important; }

        .piece {
            filter: drop-shadow(0 0 5px currentColor);
            z-index: 10;
        }
        .piece.white { color: #f8fafc; text-shadow: 0 0 8px rgba(255,255,255,0.8); }
        .piece.black { color: #0f172a; text-shadow: 0 0 8px rgba(255, 42, 42, 0.8); }

        /* Penalty Overlay */
        #penalty-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 0, 0, 0.95);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
        }

        .hacker-text {
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red);
            font-family: monospace;
            font-size: 4rem;
        }

        /* Control Nodes */
        .node-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 10px currentColor;
        }
        .node-btn:hover { transform: scale(1.1); filter: brightness(1.3); }

        /* Keyframes */
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 2px, 0); }
            20%, 80% { transform: translate3d(3px, -2px, 0); }
            30%, 50%, 70% { transform: translate3d(-5px, 4px, 0); }
            40%, 60% { transform: translate3d(5px, -4px, 0); }
        }

        @keyframes chromatic-aberration {
            0% { text-shadow: 2px 0 0 red, -2px 0 0 blue; }
            50% { text-shadow: -4px 0 0 red, 4px 0 0 blue; }
            100% { text-shadow: 0 0 0 transparent; }
        }

        @keyframes blue-pulse {
            0% { box-shadow: inset 0 0 0 0 rgba(0, 229, 255, 0); background-color: transparent; }
            50% { box-shadow: inset 0 0 50px 10px rgba(0, 229, 255, 0.6); background-color: rgba(0, 229, 255, 0.1); }
            100% { box-shadow: inset 0 0 0 0 rgba(0, 229, 255, 0); background-color: transparent; }
        }
    </style>
</head>
<body id="app-body" class="antialiased">

    <!-- Particle Canvas -->
    <canvas id="fx-canvas"></canvas>

    <!-- Penalty Lockout Overlay -->
    <div id="penalty-overlay">
        <i class="fas fa-skull hacker-text mb-6"></i>
        <h1 class="cyber-font text-5xl text-red-500 mb-2 font-bold tracking-widest text-center" style="text-shadow: 0 0 15px red;">SYSTEM LOCKOUT</h1>
        <p class="text-xl text-red-300 mb-8 font-mono">DEFEAT PENALTY ENFORCED</p>
        <div id="lockout-timer" class="cyber-font text-7xl text-white font-bold tracking-widest text-center">120.00</div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 z-40 flex items-center justify-center bg-black/80 backdrop-blur-md hidden">
        <div class="glass-panel p-8 rounded-xl max-w-md w-full border border-cyan-500/30">
            <h2 class="cyber-font text-3xl mb-6 text-center text-cyan-400" style="text-shadow: 0 0 10px #00e5ff;">NEXUS LOGIN</h2>
            <input type="text" id="username-input" class="w-full bg-slate-900/50 border border-cyan-500/50 text-white rounded p-3 mb-4 focus:outline-none focus:border-cyan-400 cyber-font placeholder-slate-500" placeholder="ENTER CODENAME" maxlength="15">
            <button id="login-btn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white cyber-font p-3 rounded transition-colors font-bold tracking-wider">INITIALIZE</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="relative z-10 container mx-auto px-4 py-8 h-screen flex flex-col hidden">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <h1 class="cyber-font text-4xl text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600" style="filter: drop-shadow(0 0 5px rgba(0,229,255,0.5));">NEXUS PROTOCOL</h1>
            <div class="flex items-center gap-4">
                <span id="user-display" class="cyber-font text-cyan-300"></span>
            </div>
        </header>

        <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Left: Interactive Nodes -->
            <div class="lg:col-span-1 flex flex-col items-center justify-center gap-6 glass-panel rounded-xl p-4">
                <div class="text-sm cyber-font text-slate-400 mb-2 rotate-180" style="writing-mode: vertical-rl;">SYSTEM NODES</div>
                <button class="node-btn" style="color: var(--neon-red); border-color: var(--neon-red);" onclick="triggerFX('red')"></button>
                <button class="node-btn" style="color: var(--neon-orange); border-color: var(--neon-orange);" onclick="triggerFX('orange')"></button>
                <button class="node-btn" style="color: var(--neon-yellow); border-color: var(--neon-yellow);" onclick="triggerFX('yellow')"></button>
                <button class="node-btn" style="color: var(--neon-green); border-color: var(--neon-green);" onclick="triggerFX('green')"></button>
                <button class="node-btn" style="color: var(--neon-blue); border-color: var(--neon-blue);" onclick="triggerFX('blue')"></button>
            </div>

            <!-- Center: Main Arena -->
            <div id="arena-container" class="lg:col-span-8 glass-panel rounded-xl p-6 flex flex-col items-center justify-center relative overflow-hidden">
                
                <!-- Lobby State -->
                <div id="lobby-view" class="w-full h-full flex flex-col items-center justify-center text-center">
                    <i class="fas fa-satellite-dish text-6xl text-cyan-500 mb-6 animate-pulse"></i>
                    <h2 class="cyber-font text-3xl mb-2">MATCHMAKING LOBBY</h2>
                    <p class="text-slate-400 mb-8">Awaiting combatants. Pairings are automated via the Nexus network.</p>
                    <button id="join-queue-btn" class="border-2 border-cyan-500 text-cyan-400 hover:bg-cyan-500/20 px-8 py-3 rounded-full cyber-font text-xl transition-all shadow-[0_0_15px_rgba(0,229,255,0.4)]">ENTER QUEUE</button>
                    <div id="queue-status" class="mt-6 text-yellow-400 cyber-font hidden">SEARCHING FOR OPPONENT...</div>
                </div>

                <!-- Match State (Hidden initially) -->
                <div id="match-view" class="w-full h-full flex-col items-center hidden">
                    
                    <!-- Opponent Info & Clock -->
                    <div class="w-full max-w-lg flex justify-between items-center mb-4 px-2">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-slate-600"><i class="fas fa-user-secret"></i></div>
                            <span id="opponent-name" class="font-bold">Opponent</span>
                        </div>
                        <div id="opponent-clock" class="cyber-font text-2xl font-bold bg-slate-900 px-4 py-1 rounded border border-slate-700">10:00</div>
                    </div>

                    <!-- The Board -->
                    <div id="chess-board" class="chess-board rounded"></div>

                    <!-- Player Info & Clock -->
                    <div class="w-full max-w-lg flex justify-between items-center mt-4 px-2">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-cyan-900 flex items-center justify-center border border-cyan-500 text-cyan-300"><i class="fas fa-user"></i></div>
                            <span id="player-name" class="font-bold text-cyan-300">You</span>
                        </div>
                        <div id="player-clock" class="cyber-font text-2xl font-bold bg-slate-900 px-4 py-1 rounded border border-cyan-500 text-cyan-400">10:00</div>
                    </div>
                    
                    <div id="match-status-msg" class="mt-4 cyber-font text-xl text-yellow-400 text-center"></div>
                    <button id="resign-btn" class="mt-4 border border-red-500 text-red-500 hover:bg-red-500/20 px-4 py-1 rounded cyber-font text-sm">ABORT MISSION (RESIGN)</button>
                </div>

            </div>

            <!-- Right: System Logs / Players -->
            <div class="lg:col-span-3 glass-panel rounded-xl p-4 flex flex-col">
                <h3 class="cyber-font text-xl mb-4 border-b border-slate-700 pb-2">ACTIVE AGENTS</h3>
                <div id="active-users-list" class="flex-1 overflow-y-auto space-y-2">
                    <!-- Populated by JS -->
                </div>
            </div>

        </div>
    </div>

    <!-- Logic Layer -->
    <script type="module">
        // Firebase Config Setup (Compliant with constraints)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, runTransaction, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State & Core Constants
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'nexus-chess';
        const fbConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDqx4yZKKhAS3F2CokTxiY0yKxNsQ21jVc", projectId: "my-project-1704840967568", databaseURL: "https://my-project-1704840967568-default-rtdb.firebaseio.com"
        };
        
        const app = initializeApp(fbConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let userData = { username: '' };
        
        // Chess Engine Instance
        const game = new Chess();
        
        // Match State
        let currentMatchId = null;
        let myColor = null; // 'w' or 'b'
        let boardFlipped = false;
        let selectedSquare = null;
        let timerInterval = null;
        let localTimers = { w: 600, b: 600 };
        const START_TIME = 600; // 10 minutes
        const INCREMENT = 1; // 1 second

        // Paths (Strict Constraint Compliance)
        const USERS_PATH = `artifacts/${appId}/public/data/users`;
        const LOBBY_PATH = `artifacts/${appId}/public/data/lobby`;
        const MATCHES_PATH = `artifacts/${appId}/public/data/matches`;

        // DOM Elements
        const UI = {
            loginModal: document.getElementById('login-modal'),
            usernameInput: document.getElementById('username-input'),
            loginBtn: document.getElementById('login-btn'),
            dashboard: document.getElementById('dashboard'),
            userDisplay: document.getElementById('user-display'),
            activeUsers: document.getElementById('active-users-list'),
            lobbyView: document.getElementById('lobby-view'),
            matchView: document.getElementById('match-view'),
            joinQueueBtn: document.getElementById('join-queue-btn'),
            queueStatus: document.getElementById('queue-status'),
            chessBoard: document.getElementById('chess-board'),
            opponentName: document.getElementById('opponent-name'),
            playerName: document.getElementById('player-name'),
            opponentClock: document.getElementById('opponent-clock'),
            playerClock: document.getElementById('player-clock'),
            matchStatusMsg: document.getElementById('match-status-msg'),
            resignBtn: document.getElementById('resign-btn'),
            penaltyOverlay: document.getElementById('penalty-overlay'),
            lockoutTimer: document.getElementById('lockout-timer'),
            body: document.getElementById('app-body'),
            arenaContainer: document.getElementById('arena-container')
        };

        // --- AUTHENTICATION & INITIALIZATION ---
        const initSystem = async () => {
            // Restore username if exists to survive refresh
            const storedName = sessionStorage.getItem('nexus_username');
            if (storedName) {
                userData.username = storedName;
            } else {
                UI.loginModal.classList.remove('hidden');
            }

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth init failed:", err);
                alert("Network anomaly. Authentication failed.");
            }
        };

        UI.loginBtn.addEventListener('click', () => {
            const val = UI.usernameInput.value.trim().toUpperCase();
            if (val.length >= 3) {
                userData.username = val;
                sessionStorage.setItem('nexus_username', val);
                UI.loginModal.classList.add('hidden');
                if (user) establishPresence();
            }
        });

        onAuthStateChanged(auth, (authUser) => {
            user = authUser;
            if (user && userData.username) {
                UI.loginModal.classList.add('hidden');
                UI.dashboard.classList.remove('hidden');
                UI.userDisplay.innerText = `AGENT: ${userData.username}`;
                establishPresence();
                setupListeners();
            }
        });

        // --- PRESENCE & GLOBAL DATA ---
        const establishPresence = async () => {
            if (!user) return;
            const userRef = doc(db, USERS_PATH, user.uid);
            await setDoc(userRef, {
                username: userData.username,
                lastSeen: serverTimestamp(),
                status: 'online'
            }, { merge: true });

            // Cleanup on unload
            window.addEventListener('beforeunload', async () => {
                await deleteDoc(doc(db, LOBBY_PATH, user.uid));
            });
        };

        const setupListeners = () => {
            if (!user) return;
            
            // Listen to Active Users
            onSnapshot(collection(db, USERS_PATH), (snap) => {
                UI.activeUsers.innerHTML = '';
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    if (d.status === 'online') {
                        const el = document.createElement('div');
                        el.className = 'flex items-center gap-2 text-sm text-slate-300';
                        el.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_5px_#00ff55]"></span> ${d.username}`;
                        UI.activeUsers.appendChild(el);
                    }
                });
            }, (err) => console.error(err));

            // Listen to Lobby for Matchmaking Automation
            onSnapshot(collection(db, LOBBY_PATH), (snap) => {
                let lobbyPlayers = [];
                snap.forEach(d => lobbyPlayers.push({ uid: d.id, ...d.data() }));
                lobbyPlayers.sort((a, b) => a.joinedAt - b.joinedAt);

                const myLobbyRecord = lobbyPlayers.find(p => p.uid === user.uid);
                if (myLobbyRecord) {
                    UI.joinQueueBtn.classList.add('hidden');
                    UI.queueStatus.classList.remove('hidden');
                } else {
                    UI.joinQueueBtn.classList.remove('hidden');
                    UI.queueStatus.classList.add('hidden');
                }

                // If I am the oldest in the queue, and there are >=2 players, orchestrate matchmaking
                if (lobbyPlayers.length >= 2 && lobbyPlayers[0].uid === user.uid) {
                    executeMatchmaking(lobbyPlayers[0], lobbyPlayers[1]);
                }
            }, (err) => console.error(err));

            // Listen to My Matches
            onSnapshot(collection(db, MATCHES_PATH), (snap) => {
                let foundMatch = null;
                snap.forEach(d => {
                    const match = { id: d.id, ...d.data() };
                    if ((match.playerWhite === user.uid || match.playerBlack === user.uid) && match.status !== 'completed') {
                        foundMatch = match;
                    }
                    // Handle completed match penalty check
                    if (match.status === 'completed' && match.loser === user.uid) {
                        const now = Date.now();
                        const endTime = match.endedAt || now;
                        if (now - endTime < 120000) {
                             triggerLockout(120000 - (now - endTime));
                        }
                    }
                });

                if (foundMatch && foundMatch.id !== currentMatchId) {
                    loadMatch(foundMatch);
                } else if (foundMatch) {
                    updateMatchState(foundMatch);
                } else if (currentMatchId && !foundMatch) {
                    // Match ended and cleared
                    leaveMatch();
                }
            }, (err) => console.error(err));
        };

        // --- MATCHMAKING TRANSACTIONS ---
        UI.joinQueueBtn.addEventListener('click', async () => {
            if (!user) return;
            try {
                await setDoc(doc(db, LOBBY_PATH, user.uid), {
                    username: userData.username,
                    joinedAt: Date.now()
                });
            } catch (err) { console.error("Queue join failed", err); }
        });

        const executeMatchmaking = async (p1, p2) => {
            const matchId = `match_${Date.now()}_${Math.random().toString(36).substring(2,7)}`;
            
            try {
                await runTransaction(db, async (t) => {
                    const p1Ref = doc(db, LOBBY_PATH, p1.uid);
                    const p2Ref = doc(db, LOBBY_PATH, p2.uid);
                    
                    const p1Snap = await t.get(p1Ref);
                    const p2Snap = await t.get(p2Ref);
                    
                    if (!p1Snap.exists() || !p2Snap.exists()) return; // State changed
                    
                    t.delete(p1Ref);
                    t.delete(p2Ref);
                    
                    const matchRef = doc(db, MATCHES_PATH, matchId);
                    t.set(matchRef, {
                        playerWhite: p1.uid,
                        playerWhiteName: p1.username,
                        playerBlack: p2.uid,
                        playerBlackName: p2.username,
                        fen: 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1',
                        turn: 'w',
                        status: 'active',
                        whiteTime: START_TIME,
                        blackTime: START_TIME,
                        lastMoveTimestamp: Date.now()
                    });
                });
            } catch(e) {
                console.error("Matchmaking transaction failed", e);
            }
        };

        // --- CHESS ENGINE & UI ---
        const loadMatch = (matchData) => {
            currentMatchId = matchData.id;
            myColor = matchData.playerWhite === user.uid ? 'w' : 'b';
            boardFlipped = myColor === 'b';
            
            UI.lobbyView.classList.add('hidden');
            UI.matchView.classList.remove('hidden');
            UI.matchView.classList.add('flex');
            
            UI.opponentName.innerText = myColor === 'w' ? matchData.playerBlackName : matchData.playerWhiteName;
            UI.playerName.innerText = myColor === 'w' ? matchData.playerWhiteName : matchData.playerBlackName;
            
            updateMatchState(matchData);
            startClocks();
        };

        const leaveMatch = () => {
            currentMatchId = null;
            UI.matchView.classList.add('hidden');
            UI.matchView.classList.remove('flex');
            UI.lobbyView.classList.remove('hidden');
            clearInterval(timerInterval);
        };

        const formatTime = (seconds) => {
            const s = Math.max(0, Math.floor(seconds));
            const m = Math.floor(s / 60);
            const remS = s % 60;
            return `${m}:${remS < 10 ? '0' : ''}${remS}`;
        };

        const updateMatchState = (matchData) => {
            game.load(matchData.fen);
            localTimers = { w: matchData.whiteTime, b: matchData.blackTime };
            renderBoard();
            
            // Check status
            if (matchData.status !== 'active') {
                clearInterval(timerInterval);
                let msg = "MATCH OVER.";
                if (matchData.winner === user.uid) msg = "VICTORY ACHIEVED.";
                else if (matchData.loser === user.uid) msg = "CRITICAL FAILURE. DEFEAT.";
                else msg = "DRAW.";
                UI.matchStatusMsg.innerText = msg;
            } else {
                UI.matchStatusMsg.innerText = game.turn() === myColor ? "YOUR TURN" : "AWAITING OPPONENT";
                UI.matchStatusMsg.className = game.turn() === myColor ? "mt-4 cyber-font text-xl text-green-400 text-center" : "mt-4 cyber-font text-xl text-slate-400 text-center";
            }
        };

        const getIconForPiece = (p) => {
            const map = {
                'p': 'fa-chess-pawn', 'r': 'fa-chess-rook', 'n': 'fa-chess-knight',
                'b': 'fa-chess-bishop', 'q': 'fa-chess-queen', 'k': 'fa-chess-king'
            };
            return map[p.type];
        };

        const renderBoard = () => {
            UI.chessBoard.innerHTML = '';
            const files = ['a','b','c','d','e','f','g','h'];
            const ranks = ['8','7','6','5','4','3','2','1'];
            
            let displayRanks = boardFlipped ? [...ranks].reverse() : ranks;
            let displayFiles = boardFlipped ? [...files].reverse() : files;

            let isDark = false;
            
            for (let r = 0; r < 8; r++) {
                for (let f = 0; f < 8; f++) {
                    const rank = displayRanks[r];
                    const file = displayFiles[f];
                    const squareId = file + rank;
                    
                    isDark = (r + f) % 2 !== 0;

                    const sqEl = document.createElement('div');
                    sqEl.className = `square ${isDark ? 'dark' : 'light'}`;
                    sqEl.dataset.square = squareId;

                    const piece = game.get(squareId);
                    if (piece) {
                        const icon = document.createElement('i');
                        icon.className = `fas ${getIconForPiece(piece)} piece ${piece.color === 'w' ? 'white' : 'black'}`;
                        sqEl.appendChild(icon);
                    }

                    sqEl.addEventListener('click', () => handleSquareClick(squareId));
                    UI.chessBoard.appendChild(sqEl);
                }
            }
        };

        const handleSquareClick = async (square) => {
            if (!currentMatchId || game.turn() !== myColor) return; // Not my turn

            if (selectedSquare) {
                // Try move
                const moves = game.moves({ square: selectedSquare, verbose: true });
                const move = moves.find(m => m.to === square);
                
                if (move) {
                    // It's a valid move, execute optimistically
                    game.move(move.san);
                    selectedSquare = null;
                    renderBoard();
                    await submitMove(move.san);
                } else {
                    // Reselect or deselect
                    const piece = game.get(square);
                    if (piece && piece.color === myColor) {
                        selectedSquare = square;
                        highlightMoves(square);
                    } else {
                        selectedSquare = null;
                        renderBoard();
                    }
                }
            } else {
                const piece = game.get(square);
                if (piece && piece.color === myColor) {
                    selectedSquare = square;
                    highlightMoves(square);
                }
            }
        };

        const highlightMoves = (square) => {
            renderBoard(); // reset
            const sqEls = document.querySelectorAll('.square');
            sqEls.forEach(el => {
                if (el.dataset.square === square) el.classList.add('selected');
            });

            const moves = game.moves({ square: square, verbose: true });
            moves.forEach(m => {
                const targetEl = document.querySelector(`.square[data-square="${m.to}"]`);
                if (targetEl) targetEl.classList.add('highlight');
            });
        };

        const submitMove = async (san) => {
            try {
                await runTransaction(db, async (t) => {
                    const matchRef = doc(db, MATCHES_PATH, currentMatchId);
                    const matchSnap = await t.get(matchRef);
                    if (!matchSnap.exists()) return;
                    
                    const match = matchSnap.data();
                    if (match.turn !== myColor || match.status !== 'active') throw "Invalid sync";

                    // Reconstruct game logic for safety
                    const serverGame = new Chess();
                    serverGame.load(match.fen);
                    const moveRes = serverGame.move(san);
                    if (!moveRes) throw "Invalid move";

                    // Time logic
                    const now = Date.now();
                    const elapsed = (now - match.lastMoveTimestamp) / 1000;
                    let newWhiteTime = match.whiteTime;
                    let newBlackTime = match.blackTime;
                    
                    if (myColor === 'w') newWhiteTime = Math.max(0, newWhiteTime - elapsed + INCREMENT);
                    else newBlackTime = Math.max(0, newBlackTime - elapsed + INCREMENT);

                    let status = 'active';
                    let winner = null;
                    let loser = null;

                    if (serverGame.in_checkmate()) {
                        status = 'completed';
                        winner = myColor === 'w' ? match.playerWhite : match.playerBlack;
                        loser = myColor === 'w' ? match.playerBlack : match.playerWhite;
                    } else if (serverGame.in_draw() || serverGame.in_stalemate() || serverGame.in_threefold_repetition()) {
                        status = 'completed';
                    } else if (newWhiteTime <= 0) {
                        status = 'completed';
                        winner = match.playerBlack; loser = match.playerWhite;
                    } else if (newBlackTime <= 0) {
                        status = 'completed';
                        winner = match.playerWhite; loser = match.playerBlack;
                    }

                    t.update(matchRef, {
                        fen: serverGame.fen(),
                        turn: serverGame.turn(),
                        whiteTime: newWhiteTime,
                        blackTime: newBlackTime,
                        lastMoveTimestamp: now,
                        status, winner, loser,
                        endedAt: status === 'completed' ? now : null
                    });
                });
            } catch (err) {
                console.error("Move submission failed", err);
            }
        };

        const startClocks = () => {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!currentMatchId) return;
                
                // Decrement local time for the player whose turn it is
                if (game.turn() === 'w') {
                    localTimers.w -= 0.1;
                } else {
                    localTimers.b -= 0.1;
                }
                
                // Timeout logic client side (visual only, server validates)
                if (localTimers.w <= 0 || localTimers.b <= 0) {
                     clearInterval(timerInterval);
                }

                // Update UI
                if (myColor === 'w') {
                    UI.playerClock.innerText = formatTime(localTimers.w);
                    UI.opponentClock.innerText = formatTime(localTimers.b);
                } else {
                    UI.playerClock.innerText = formatTime(localTimers.b);
                    UI.opponentClock.innerText = formatTime(localTimers.w);
                }

            }, 100);
        };

        UI.resignBtn.addEventListener('click', async () => {
            if (!currentMatchId) return;
            try {
                await runTransaction(db, async (t) => {
                    const matchRef = doc(db, MATCHES_PATH, currentMatchId);
                    const snap = await t.get(matchRef);
                    if (!snap.exists()) return;
                    const m = snap.data();
                    t.update(matchRef, {
                        status: 'completed',
                        winner: myColor === 'w' ? m.playerBlack : m.playerWhite,
                        loser: user.uid,
                        endedAt: Date.now()
                    });
                });
            } catch (err) { console.error("Resign fail", err); }
        });


        // --- PARTICLE PHYSICS & EFFECTS ---
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationFrameId;

        const resizeCanvas = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const colorMap = {
            'red': '255, 42, 42',
            'orange': '255, 123, 0',
            'yellow': '252, 232, 3',
            'green': '0, 255, 85',
            'blue': '0, 229, 255'
        };

        class Particle {
            constructor(x, y, colorStr) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 15 + 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 0.96;
                this.gravity = 0.2;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.015;
                this.color = colorStr;
                this.size = Math.random() * 4 + 2;
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${this.life})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgb(${this.color})`;
                ctx.fill();
            }
        }

        const runParticles = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw(ctx);
                if (p.life <= 0) particles.splice(i, 1);
            }
            if (particles.length > 0) {
                animationFrameId = requestAnimationFrame(runParticles);
            }
        };

        window.triggerFX = (color) => {
            if (color === 'blue') {
                // Blue pulse bypasses particles, flashes UI
                UI.arenaContainer.classList.remove('pulse-flash');
                void UI.arenaContainer.offsetWidth; // trigger reflow
                UI.arenaContainer.classList.add('pulse-flash');
                return;
            }

            // Other colors trigger physics explosion & screen effects
            const x = window.innerWidth / 2;
            const y = window.innerHeight / 2;
            const colorRgb = colorMap[color];
            
            for(let i=0; i<80; i++) {
                particles.push(new Particle(x, y, colorRgb));
            }
            if (particles.length <= 80) runParticles(); // start loop if not running

            // Screen Shake & Chromatic
            UI.body.classList.remove('shake', 'chromatic');
            void UI.body.offsetWidth; // reflow
            UI.body.classList.add('shake', 'chromatic');
            
            setTimeout(() => {
                UI.body.classList.remove('shake', 'chromatic');
            }, 500);
        };


        // --- PENALTY LOCKOUT SANDBOX ---
        let lockoutInterval;

        const blockEvents = (e) => {
            e.stopPropagation();
            e.preventDefault();
            return false;
        };
        const blockedEventTypes = ['contextmenu', 'selectstart', 'dragstart', 'keydown', 'keypress', 'keyup', 'mousedown', 'mouseup', 'click', 'dblclick'];

        const triggerLockout = (durationMs) => {
            UI.penaltyOverlay.style.display = 'flex';
            let remaining = durationMs;
            
            // Apply strict sandbox capture phase listeners
            blockedEventTypes.forEach(ev => window.addEventListener(ev, blockEvents, { capture: true, passive: false }));

            lockoutInterval = setInterval(() => {
                remaining -= 10; // update 100fps for smooth ms counter
                if (remaining <= 0) {
                    endLockout();
                } else {
                    UI.lockoutTimer.innerText = (remaining / 1000).toFixed(2);
                }
            }, 10);
        };

        const endLockout = () => {
            clearInterval(lockoutInterval);
            UI.penaltyOverlay.style.display = 'none';
            blockedEventTypes.forEach(ev => window.removeEventListener(ev, blockEvents, { capture: true, passive: false }));
        };

        // Bootstrap App
        initSystem();

    </script>
</body>
</html>
