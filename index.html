<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Tournament</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e2f; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 2px solid #b58863; margin: 20px 0; }
        .square { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 40px; cursor: pointer; user-select: none; }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .selected { box-shadow: inset 0 0 10px #ff0; }
        .legal-move { background: radial-gradient(circle, rgba(0,0,0,0.2) 20%, transparent 20%); }
        .clock { font-size: 1.5rem; background: #333; padding: 8px 20px; border-radius: 8px; margin: 0 20px; }
        .active-clock { background: #4caf50; }
        .info { margin-bottom: 10px; }
        #bracket { margin-top: 30px; width: 100%; max-width: 600px; }
        .round { margin-bottom: 15px; }
        .match { background: #2a2a3a; padding: 10px; border-radius: 8px; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>♟️ Chess Tournament</h1>
    <div id="matchView" style="display:none;">
        <div class="info">
            <span id="whiteName"></span> <span id="whiteClock" class="clock">10:00</span>
            vs
            <span id="blackClock" class="clock">10:00</span> <span id="blackName"></span>
        </div>
        <div id="board"></div>
        <div id="status"></div>
        <button id="resignBtn" style="margin-top:10px; padding:8px 20px; background:#e74c3c; border:none; color:white; border-radius:20px; cursor:pointer;">Resign</button>
    </div>
    <div id="bracketView"></div>
    <a href="index.html" style="margin-top:20px; color:#aaa;">← Back</a>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script>
        // FIREBASE CONFIG (SAME AS INDEX)
        const firebaseConfig = {
          apiKey: "AIzaSyDqx4yZKKhAS3F2CokTxiY0yKxNsQ21jVc",
          authDomain: "my-project-1704840967568.firebaseapp.com",
          databaseURL: "https://my-project-1704840967568-default-rtdb.firebaseio.com",
          projectId: "my-project-1704840967568",
          storageBucket: "my-project-1704840967568.firebasestorage.app",
          messagingSenderId: "160430314341",
          appId: "1:160430314341:web:40da9a21dd9e86adeb078c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const currentUser = sessionStorage.getItem('currentUser');
        if (!currentUser) window.location.href = 'index.html';

        const boardEl = document.getElementById('board');
        const whiteClockEl = document.getElementById('whiteClock');
        const blackClockEl = document.getElementById('blackClock');
        const statusEl = document.getElementById('status');
        const resignBtn = document.getElementById('resignBtn');
        const matchView = document.getElementById('matchView');
        const bracketView = document.getElementById('bracketView');

        let game = new Chess();
        let matchId = null;
        let matchData = null;
        let myColor = null;
        let clockInterval = null;

        // Get the active tournament and find the user's match
        function findMyMatch() {
            db.ref('tournaments/active').once('value', snap => {
                const tid = snap.val();
                if (!tid) return alert('No active tournament');
                db.ref(`tournaments/${tid}/rounds`).once('value', roundsSnap => {
                    const rounds = roundsSnap.val();
                    if (!rounds) return;
                    for (let roundKey of Object.keys(rounds)) {
                        const round = rounds[roundKey];
                        if (round.matches) {
                            for (let matchKey of Object.keys(round.matches)) {
                                db.ref(`matches/${matchKey}`).once('value', mSnap => {
                                    const m = mSnap.val();
                                    if (m && (m.white === currentUser || m.black === currentUser) && m.status === 'active') {
                                        matchId = matchKey;
                                        matchData = m;
                                        myColor = m.white === currentUser ? 'white' : 'black';
                                        startGame();
                                    }
                                });
                            }
                        }
                    }
                    if (!matchId) {
                        // maybe a bye? show bracket
                        matchView.style.display = 'none';
                        loadBracket(tid);
                    }
                });
            });
        }

        function startGame() {
            matchView.style.display = 'block';
            document.getElementById('whiteName').textContent = matchData.white;
            document.getElementById('blackName').textContent = matchData.black;
            // load moves
            if (matchData.moves) {
                matchData.moves.forEach(m => game.move(m));
            }
            renderBoard();
            updateClockDisplay();
            startClock();
            listenForUpdates();
            resignBtn.addEventListener('click', resign);
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            const fen = game.fen();
            const rows = fen.split(' ')[0].split('/');
            for (let i=0; i<8; i++) {
                let col = 0;
                for (let char of rows[i]) {
                    if (isNaN(char)) {
                        const square = String.fromCharCode(97+col) + (8-i);
                        const piece = getPieceUnicode(char);
                        const sqDiv = document.createElement('div');
                        sqDiv.className = `square ${(i+col)%2===0 ? 'light' : 'dark'}`;
                        sqDiv.dataset.square = square;
                        sqDiv.textContent = piece;
                        sqDiv.addEventListener('click', onSquareClick);
                        boardEl.appendChild(sqDiv);
                        col++;
                    } else {
                        col += parseInt(char);
                    }
                }
            }
        }

        function getPieceUnicode(piece) {
            const map = { 'K':'♔','Q':'♕','R':'♖','B':'♗','N':'♘','P':'♙',
                           'k':'♚','q':'♛','r':'♜','b':'♝','n':'♞','p':'♟' };
            return map[piece] || '';
        }

        let selectedSquare = null;
        let legalMoves = [];

        function onSquareClick(e) {
            if (game.turn() !== (myColor==='white'?'w':'b')) return;
            const square = e.target.dataset.square;
            if (selectedSquare) {
                const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                if (move) {
                    pushMove(move);
                    selectedSquare = null;
                    clearHighlights();
                    renderBoard();
                } else {
                    clearHighlights();
                    // try to select another piece
                    selectPiece(square);
                }
            } else {
                selectPiece(square);
            }
        }

        function selectPiece(square) {
            const piece = game.get(square);
            if (piece && piece.color === (myColor==='white'?'w':'b')) {
                selectedSquare = square;
                legalMoves = game.moves({ square, verbose: true }).map(m => m.to);
                highlightSquare(square, true);
                legalMoves.forEach(to => highlightSquare(to, false, true));
            }
        }

        function highlightSquare(square, isSelected, isLegal) {
            const sqDiv = document.querySelector(`[data-square="${square}"]`);
            if (!sqDiv) return;
            if (isSelected) sqDiv.classList.add('selected');
            if (isLegal) sqDiv.classList.add('legal-move');
        }

        function clearHighlights() {
            document.querySelectorAll('.selected, .legal-move').forEach(el => el.classList.remove('selected', 'legal-move'));
            legalMoves = [];
            selectedSquare = null;
        }

        function pushMove(move) {
            const now = Date.now();
            const timeConsumed = now - lastTimestamp;
            // update clocks
            const myTimeKey = myColor === 'white' ? 'whiteTimeRemaining' : 'blackTimeRemaining';
            const newTime = Math.max(0, matchData[myTimeKey] - timeConsumed + matchData.increment);
            // transaction to update move and times
            db.ref(`matches/${matchId}`).transaction(current => {
                if (!current || current.status !== 'active') return; // abort
                const moves = current.moves || [];
                moves.push({ from: move.from, to: move.to, timestamp: firebase.database.ServerValue.TIMESTAMP });
                current.moves = moves;
                current[myTimeKey] = newTime;
                // update last move timestamp
                current.lastMoveTimestamp = firebase.database.ServerValue.TIMESTAMP;
                return current;
            });
            lastTimestamp = now; // optimistic local update
        }

        let lastTimestamp = Date.now();

        function listenForUpdates() {
            db.ref(`matches/${matchId}`).on('value', snap => {
                const updated = snap.val();
                if (!updated || updated.status !== 'active') {
                    if (updated && (updated.status === 'white_won' || updated.status === 'black_won')) {
                        endGame(updated);
                    }
                    return;
                }
                // sync moves
                const oldMoves = matchData.moves || [];
                const newMoves = updated.moves || [];
                if (newMoves.length > oldMoves.length) {
                    for (let i = oldMoves.length; i < newMoves.length; i++) {
                        game.move(newMoves[i]);
                    }
                    renderBoard();
                }
                matchData = updated;
                updateClockDisplay();
            });
        }

        function updateClockDisplay() {
            const wTime = matchData.whiteTimeRemaining || 600000;
            const bTime = matchData.blackTimeRemaining || 600000;
            whiteClockEl.textContent = formatTime(wTime);
            blackClockEl.textContent = formatTime(bTime);
            whiteClockEl.classList.toggle('active-clock', game.turn() === 'w');
            blackClockEl.classList.toggle('active-clock', game.turn() === 'b');
        }

        function formatTime(ms) {
            const totalSec = Math.floor(ms/1000);
            const mins = Math.floor(totalSec/60);
            const secs = totalSec % 60;
            return `${mins}:${secs.toString().padStart(2,'0')}`;
        }

        function startClock() {
            if (clockInterval) clearInterval(clockInterval);
            clockInterval = setInterval(() => {
                if (!matchData || matchData.status !== 'active') return;
                const elapsed = Date.now() - lastTimestamp;
                if (game.turn() === 'w') {
                    const newTime = Math.max(0, matchData.whiteTimeRemaining - elapsed);
                    whiteClockEl.textContent = formatTime(newTime);
                    if (newTime <= 0) handleTimeout('white');
                } else {
                    const newTime = Math.max(0, matchData.blackTimeRemaining - elapsed);
                    blackClockEl.textContent = formatTime(newTime);
                    if (newTime <= 0) handleTimeout('black');
                }
            }, 200);
        }

        function handleTimeout(color) {
            db.ref(`matches/${matchId}`).update({
                status: color === 'white' ? 'black_won' : 'white_won',
                resultReason: 'timeout'
            });
        }

        function resign() {
            if (confirm('Resign?')) {
                db.ref(`matches/${matchId}`).update({
                    status: myColor === 'white' ? 'black_won' : 'white_won',
                    resultReason: 'resign'
                });
            }
        }

        function endGame(updated) {
            clearInterval(clockInterval);
            statusEl.textContent = updated.resultReason === 'checkmate' ? 'Checkmate!' : updated.resultReason;
            resignBtn.style.display = 'none';
            // lock loser
            const loser = updated.status === 'white_won' ? matchData.black : matchData.white;
            db.ref('sabotages/' + loser).set(Date.now() + 120000);
            // after a few seconds show bracket
            setTimeout(() => {
                matchView.style.display = 'none';
                loadBracket();
            }, 3000);
        }

        function loadBracket(tid) {
            if (!tid) db.ref('tournaments/active').once('value', snap => { loadBracket(snap.val()); });
            else {
                db.ref(`tournaments/${tid}`).on('value', snap => {
                    const t = snap.val();
                    if (!t) return;
                    bracketView.innerHTML = '<h2>Tournament Bracket</h2>';
                    // list rounds
                    const rounds = t.rounds || {};
                    Object.keys(rounds).forEach(rKey => {
                        const roundDiv = document.createElement('div');
                        roundDiv.className = 'round';
                        roundDiv.innerHTML = `<h3>${rKey}</h3>`;
                        const round = rounds[rKey];
                        if (round.bye) roundDiv.innerHTML += `<div class="match">BYE: ${round.bye}</div>`;
                        for (let mId of Object.keys(round.matches)) {
                            db.ref(`matches/${mId}`).once('value', mSnap => {
                                const m = mSnap.val();
                                if (m) {
                                    const result = m.status === 'white_won' ? `${m.white} won` : (m.status === 'black_won' ? `${m.black} won` : 'in progress');
                                    roundDiv.innerHTML += `<div class="match">${m.white} vs ${m.black} - ${result}</div>`;
                                }
                            });
                        }
                        bracketView.appendChild(roundDiv);
                    });
                    bracketView.style.display = 'block';
                });
            }
        }

        findMyMatch();
    </script>
</body>
</html>
